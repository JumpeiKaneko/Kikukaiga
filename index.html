<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絵画を聴く</title>
    <link rel="stylesheet" href="style.css?v=20260628_kiku">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1 class="project-title">絵画を聴く</h1>
    </header>

    <div class="section">
        <div class="painting-view-container">
            
            <div id="base-painting-wrapper" class="base-painting-wrapper">
                <img src="./assets/monet_suiren.jpg" alt="Monet" class="painting-image">
                <div class="invisible-grid">
                    <div class="grid-cell-trigger" data-id="1"></div>
                    <div class="grid-cell-trigger" data-id="2"></div>
                    <div class="grid-cell-trigger" data-id="3"></div>
                    <div class="grid-cell-trigger" data-id="4"></div>
                    <div class="grid-cell-trigger" data-id="5"></div>
                    <div class="grid-cell-trigger" data-id="6"></div>
                    <div class="grid-cell-trigger" data-id="7"></div>
                    <div class="grid-cell-trigger" data-id="8"></div>
                    <div class="grid-cell-trigger" data-id="9"></div>
                </div>
            </div>

            <div id="trimming-zoom-wrapper" class="trimming-zoom-wrapper" style="display: none;">
                <img id="trimmed-image-target" src="./assets/monet_suiren.jpg" alt="Trimmed Monet" class="painting-image">
            </div>
            
        </div>

        <div id="controls-area" class="controls-area" style="visibility: hidden;">
            <button id="btn-zoom-back" class="back-text-trigger">戻る</button>
        </div>
    </div>
</div>

<canvas id="unity-canvas" style="display: none; width: 0px; height: 0px;"></canvas>
<script>
    var loaderUrl = "./Unity/Build/build_bird.loader.js"; 
    var config = {
        dataUrl: "./Unity/Build/build_bird.data",
        frameworkUrl: "./Unity/Build/build_bird.framework.js",
        codeUrl: "./Unity/Build/build_bird.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "kaiga-wo-kiku",
        productVersion: "0.1",
    };
    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {}).then((instance) => {
            window.unityInstance = instance;
        }).catch((message) => {
            console.error(message);
        });
    };
    document.body.appendChild(script);
</script>

<script src="app.js?v=20260628_kiku"></script>
</body>
</html>
